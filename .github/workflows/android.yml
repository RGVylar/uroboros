name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build SvelteKit
        working-directory: frontend
        run: npm run build

      - name: Generate Android icons
        working-directory: frontend
        run: |
          # Install ImageMagick
          sudo apt-get update && sudo apt-get install -y imagemagick

          # Generate icons from logo.png
          declare -A SIZES=( ["mdpi"]="48" ["hdpi"]="72" ["xhdpi"]="96" ["xxhdpi"]="144" ["xxxhdpi"]="192" )

          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            mkdir -p "android/app/src/main/res/mipmap-$density"

            # Resize logo to target size
            convert "static/logo.png" -resize "${size}x${size}" -extent "${size}x${size}" \
              -background "none" -gravity Center \
              "android/app/src/main/res/mipmap-$density/ic_launcher.png"

            convert "static/logo.png" -resize "${size}x${size}" -extent "${size}x${size}" \
              -background "none" -gravity Center \
              "android/app/src/main/res/mipmap-$density/ic_launcher_round.png"
          done

          echo "Icons generated successfully"

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uroboros-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Nextcloud
        if: success()
        run: |
          APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          FILENAME="uroboros-debug-$(date +%Y%m%d-%H%M).apk"
          curl --fail --show-error -u "sGJbnegkQ4SapJo:" -T "$APK" \
            "https://files.mugrelore.com/public.php/webdav/${FILENAME}"
