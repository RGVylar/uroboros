name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build SvelteKit
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Generate Android icons
        working-directory: frontend
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick

          declare -A SIZES=(
            ["mdpi"]="48"
            ["hdpi"]="72"
            ["xhdpi"]="96"
            ["xxhdpi"]="144"
            ["xxxhdpi"]="192"
          )

          for density in "${!SIZES[@]}"; do
            size=${SIZES[$density]}
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"

            # Launcher icon (square)
            convert "static/logo.png" -resize "${size}x${size}" \
              -background none -gravity center -extent "${size}x${size}" \
              "$dir/ic_launcher.png"

            # Round launcher icon
            convert "static/logo.png" -resize "${size}x${size}" \
              -background none -gravity center -extent "${size}x${size}" \
              "$dir/ic_launcher_round.png"

            # Foreground layer (for adaptive icons, API 26+)
            # Use 108dp canvas with logo at 72% to leave safe zone padding
            safe=$(echo "$size * 108 / 72" | bc)
            convert "static/logo.png" -resize "${size}x${size}" \
              -background none -gravity center -extent "${safe}x${safe}" \
              "$dir/ic_launcher_foreground.png"

            echo "✓ $density: ${size}px"
          done

          echo "All icons generated"

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uroboros-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Nextcloud
        if: success()
        run: |
          APK="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          FILENAME="uroboros-debug-$(date +%Y%m%d-%H%M).apk"
          curl --fail --show-error -u "sGJbnegkQ4SapJo:" -T "$APK" \
            "https://files.mugrelore.com/public.php/webdav/${FILENAME}"
